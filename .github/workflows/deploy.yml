name: Deploy to cp-1.triton.net

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: cpanel1.triton.net
          username: tripop
          port: 22313
          key: ${{ secrets.DEPLOY_KEY_TRITON }}
          script: |
            cd ~/repositories/www.triton.net
            git pull origin master
            cp index.html about.html paybill.html policy.html ~/public_html/www/
            cp tti-ga.html tti-nvr.html tti-voip.html ~/public_html/www/
            cp send-quote.php send-voip-quote.php ~/public_html/www/
            cp frigate-clean-view.user.css ~/public_html/www/
            echo "Triton Technologies deployed OK"
