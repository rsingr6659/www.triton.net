name: Deploy to cpanel1.triton.net

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: cpanel1.triton.net
          username: tripop
          port: 22313
          key: ${{ secrets.DEPLOY_KEY_TRITON }}
          source: "index.html,about.html,paybill.html,policy.html,tti-ga.html,tti-nvr.html,tti-voip.html,send-quote.php,send-voip-quote.php,frigate-style-handler.php,frigate-clean-view.user.css,.htaccess"
          target: "~/public_html/www/"
